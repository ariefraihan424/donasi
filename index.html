<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salin Nomor Rekening</title>

<style>
body{
font-family: Arial, sans-serif;
text-align:center;
margin-top:120px;
background:#f5f5f5;
}

.kotak{
background:white;
padding:30px;
border-radius:12px;
display:inline-block;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
background:#0d6efd;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084298;
}
</style>

</head>

<body>

<div class="kotak">

<h2>Rekening Donasi</h2>

<p>Bank BTN</p>
<p>a.n. Uswatun Khasanah</p>

<h3 id="rekening">69601610031501</h3>

<button onclick="salinRekening()">Salin Nomor Rekening</button>

<p id="pesan"></p>

</div>

<script>
function salinRekening(){
var teks = document.getElementById("rekening").innerText;
navigator.clipboard.writeText(teks);
document.getElementById("pesan").innerText="Nomor rekening berhasil disalin";
}
</script>

</body>
</html>
